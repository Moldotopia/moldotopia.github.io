<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="INTIMO">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#162033"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.2" cy="0.3" r="0.5">
      <stop offset="0" stop-color="#3a7bd5" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#3a7bd5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.8" r="0.45">
      <stop offset="0" stop-color="#5b9bd5" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#5b9bd5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wordmark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4a8de0"/>
      <stop offset="1" stop-color="#2a65b8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Connection rings -->
  <circle cx="600" cy="200" r="52" fill="none" stroke="#4a8de0" stroke-width="2.5" opacity="0.35"/>
  <circle cx="640" cy="200" r="52" fill="none" stroke="#5b9bd5" stroke-width="2.5" opacity="0.35"/>

  <text x="600" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="76" font-weight="800" fill="url(#wordmark)" letter-spacing="6">INTIMO</text>
  <text x="600" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="400" fill="#94a3b8">Build stronger connection through small daily moments</text>

  <rect x="460" y="450" width="280" height="52" rx="26" fill="none" stroke="#3a7bd5" stroke-opacity="0.3" stroke-width="1.5"/>
  <text x="600" y="483" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="600" fill="#94a3b8">intimo.pro</text>
</svg>
